name: GitHub Daily Feishu Report

on:
  schedule:
    # 每天 09:00 北京时间 (01:00 UTC)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print content, skip Feishu push)"
        type: boolean
        default: false

jobs:
  report:
    name: Fetch trending & push to Feishu
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily report
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python scripts/github_daily_report.py

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: report-failure-log
          path: /tmp/*.json
          retention-days: 3
